name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build a static or near-static binary for each Linux release target,
  # package it as a tarball alongside README + LICENSE files + a sample
  # config. Each archive is uploaded as a release asset.
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross
        run: cargo install --locked cross

      - name: cargo build (release)
        run: cross build --release --target ${{ matrix.target }} -p conduit

      - name: package
        id: package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="conduit-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/conduit" "dist/${stage}/"
          cp README.md CHARTER.md CONTRIBUTING.md "dist/${stage}/"
          cp examples/conduit.toml "dist/${stage}/conduit.toml.example"
          # LICENSE files land in Phase 12; until then, ship the
          # README's licence section as a placeholder.
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          sha256sum "dist/${stage}.tar.gz" > "dist/${stage}.tar.gz.sha256"
          echo "archive=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${stage}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: upload archive
        uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  # Multi-arch Docker image. Built from the Dockerfile at the repo
  # root. Pushed to ghcr.io/<owner>/conduit at the tag.
  docker:
    name: docker (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/conduit:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/conduit:latest

  # Aggregate the per-target archives into a single GitHub Release
  # with all assets attached. Runs only after every build job
  # succeeds.
  release:
    name: github release
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
