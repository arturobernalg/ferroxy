name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Production target. Full quality gate plus integration tests.
  linux:
    name: linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross-compilation tooling
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          cargo install --locked cross
          echo "CARGO=cross" >> "$GITHUB_ENV"

      - name: install cargo-deny
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install --locked cargo-deny

      - name: cargo build
        run: ${{ env.CARGO || 'cargo' }} build --workspace --all-targets --release --target ${{ matrix.target }}

      - name: cargo test
        # Only run tests on the host architecture (cross-arch test
        # execution requires qemu and is brittle). Build still verifies
        # the cross-compile.
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: cargo clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: cargo fmt
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --all -- --check

      - name: cargo deny
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deny check

  # Development target. Cross-platform compile path, no integration
  # tests, no release artefact. This job exists so the tokio backend
  # does not bitrot.
  macos:
    name: macos (dev path)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-tokio

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        run: cargo fmt --all -- --check
