name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Production target — the full quality gate runs here. Cross-compile
  # checks for the other Linux release targets live in the release
  # workflow (which `cross` actually drives end-to-end against the
  # build matrix the published artefacts need). CI's job is to catch
  # regressions on the actual hot path; cross-compilation only
  # exercises the build, not the runtime.
  linux:
    name: linux (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-gnu

      - name: install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo build
        run: cargo build --workspace --all-targets --release

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo deny
        run: cargo deny check

  # Development target. Cross-platform compile path, no integration
  # tests, no release artefact. This job exists so the tokio backend
  # does not bitrot.
  macos:
    name: macos (dev path)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-tokio

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        run: cargo fmt --all -- --check
