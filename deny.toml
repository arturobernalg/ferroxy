# cargo-deny configuration for conduit.
#
# Targets cargo-deny v0.16+ schema (version = 2 where the section supports it).
# Enforces:
#   - No advisories (RUSTSEC). Yanked deps are denied.
#   - Allow only the standard permissive licenses. New license = explicit
#     decision in this file.
#   - No wildcard versions, no unknown-source git/registry deps.
#   - Layer-direction enforcement via [[bans.deny]] with `wrappers`: each
#     internal crate lists the only set of crates allowed to have a direct
#     dependency on it. Adding an upward edge fails the gate.

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2025-0057: fxhash is unmaintained; pulled in transitively
# through monoio. No security CVE — informational only. Track until
# monoio switches to rustc-hash (or another active hasher).
ignore = ["RUSTSEC-2025-0057"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.93
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# ---------------------------------------------------------------------------
# bans
# ---------------------------------------------------------------------------
# `multiple-versions = "warn"` keeps duplicate transitive deps visible
# without breaking the gate; we'll tighten as the dep graph stabilises.
# `wildcards = "deny"` is non-negotiable: pinned ranges only.
#
# Layer model expressed as wrapper allowlists. For each conduit-* crate,
# `wrappers` lists every crate permitted to depend on it directly. Anything
# else is rejected.

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Layer 1 — io: bottom of the stack. Used by transport, every protocol
# crate (their accept-side glue), upstream (egress sockets), control
# (admin listener), and the binary.
[[bans.deny]]
crate = "conduit-io"
wrappers = [
    "conduit-transport",
    "conduit-h1",
    "conduit-h2",
    "conduit-h3",
    "conduit-upstream",
    "conduit-control",
    "conduit",
]

# Layer 3 contract — proto: the request/response stream type. Every protocol
# crate, upstream, lifecycle, control surfaces it; binary wires it.
[[bans.deny]]
crate = "conduit-proto"
wrappers = [
    "conduit-h1",
    "conduit-h2",
    "conduit-h3",
    "conduit-upstream",
    "conduit-lifecycle",
    "conduit-control",
    "conduit",
]

# Layer 6 — config: only control consumes it (the binary loads it via
# control or directly during phase 0).
[[bans.deny]]
crate = "conduit-config"
wrappers = ["conduit-control", "conduit"]

# Layer 2 — transport: TLS + QUIC. Used by every protocol crate (server
# side), upstream (egress TLS), control (admin TLS, eventually).
[[bans.deny]]
crate = "conduit-transport"
wrappers = [
    "conduit-h1",
    "conduit-h2",
    "conduit-h3",
    "conduit-upstream",
    "conduit-control",
    "conduit",
]

# Layer 3 — h1: only the upstream pool (client) and the binary use it
# directly. Server-side wiring goes through transport+lifecycle.
[[bans.deny]]
crate = "conduit-h1"
wrappers = ["conduit-upstream", "conduit"]

[[bans.deny]]
crate = "conduit-h2"
wrappers = ["conduit-upstream", "conduit"]

[[bans.deny]]
crate = "conduit-h3"
wrappers = ["conduit-upstream", "conduit"]

# Layer 5 — upstream: lifecycle dispatches to it; control reads stats; the
# binary holds the runtime.
[[bans.deny]]
crate = "conduit-upstream"
wrappers = ["conduit-lifecycle", "conduit-control", "conduit"]

# Layer 4 — lifecycle: control orchestrates it, binary wires it.
[[bans.deny]]
crate = "conduit-lifecycle"
wrappers = ["conduit-control", "conduit"]

# Layer 6 — control: only the binary depends on it.
[[bans.deny]]
crate = "conduit-control"
wrappers = ["conduit"]
