# cargo-deny configuration for conduit.
#
# Targets cargo-deny v0.16+ schema (version = 2 where the section supports it).
# Enforces:
#   - No advisories (RUSTSEC). Yanked deps are denied.
#   - Allow only the standard permissive licenses. New license = explicit
#     decision in this file.
#   - No wildcard versions, no unknown-source git/registry deps.
#   - Layer-direction enforcement via [[bans.deny]] with `wrappers`: each
#     internal crate lists the only set of crates allowed to have a direct
#     dependency on it. Adding an upward edge fails the gate.

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2025-0057: fxhash is unmaintained; pulled in transitively
# through monoio. No security CVE — informational only. Track until
# monoio switches to rustc-hash (or another active hasher).
ignore = ["RUSTSEC-2025-0057"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots ships the Mozilla CA bundle under CDLA-Permissive-2.0,
    # which is a permissive data license (the OSI hasn't certified it
    # but the Linux Foundation publishes it). We accept it for the
    # bundled root store; no source file in conduit is licensed
    # under it.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# ---------------------------------------------------------------------------
# bans
# ---------------------------------------------------------------------------
# `multiple-versions = "warn"` keeps duplicate transitive deps visible
# without breaking the gate; we'll tighten as the dep graph stabilises.
# `wildcards = "deny"` is non-negotiable: pinned ranges only.
#
# Layer model expressed as wrapper allowlists. For each conduit-* crate,
# `wrappers` lists every crate permitted to depend on it directly. Anything
# else is rejected.

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Wrapper lists below are the **actually-used** dependents for each
# layer, not the anticipated future graph. When a new edge lands
# (e.g. control starts consuming upstream stats), add the wrapper in
# the same commit that adds the dep — keeping the list trimmed makes
# `cargo deny check` output noise-free, which makes a real failure
# obvious.

# Layer 1 — io: bound directly only by the binary today. The
# protocol crates take any tokio-shaped stream (the binary feeds
# them an io::TcpStream).
[[bans.deny]]
crate = "conduit-io"
wrappers = ["conduit"]

# Layer 3 contract — proto: the request/response stream type. Every
# protocol crate, upstream, lifecycle, and the binary depend on it.
[[bans.deny]]
crate = "conduit-proto"
wrappers = [
    "conduit-h1",
    "conduit-h2",
    "conduit-h3",
    "conduit-upstream",
    "conduit-lifecycle",
    "conduit",
]

# Config: read by control (orchestration), upstream
# (RetryPolicy / UpstreamTlsOptions::from_config), lifecycle
# (RouteTable / UpstreamMap::from_config), transport
# (TlsConfig → rustls::ServerConfig), and the binary.
[[bans.deny]]
crate = "conduit-config"
wrappers = [
    "conduit-control",
    "conduit-lifecycle",
    "conduit-upstream",
    "conduit-transport",
    "conduit",
]

# Layer 2 — transport: today the binary calls accept_tls directly
# and hands the TLS-wrapped stream to conduit-h1 / conduit-h2. The
# protocol crates do not depend on transport — they take any
# tokio-shaped stream.
[[bans.deny]]
crate = "conduit-transport"
wrappers = ["conduit"]

# Layer 3 — h1: upstream client pool depends on it via hyper-util;
# lifecycle uses it as a dev-dependency for the end-to-end test;
# the binary calls serve_connection directly.
[[bans.deny]]
crate = "conduit-h1"
wrappers = ["conduit-lifecycle", "conduit"]

# Layer 3 — h2: only the binary calls it directly (ALPN dispatch).
[[bans.deny]]
crate = "conduit-h2"
wrappers = ["conduit"]

# Layer 3 — h3: only the binary calls it directly (QUIC listener).
[[bans.deny]]
crate = "conduit-h3"
wrappers = ["conduit"]

# Layer 5 — upstream: lifecycle dispatches to it, the binary
# spawns its health probes.
[[bans.deny]]
crate = "conduit-upstream"
wrappers = ["conduit-lifecycle", "conduit"]

# Layer 4 — lifecycle: only the binary holds the Dispatch.
[[bans.deny]]
crate = "conduit-lifecycle"
wrappers = ["conduit"]

# Layer 6 — control: only the binary holds the admin server.
[[bans.deny]]
crate = "conduit-control"
wrappers = ["conduit"]

# Layer 6 — control: only the binary depends on it.
[[bans.deny]]
crate = "conduit-control"
wrappers = ["conduit"]
