# Example ferroxy configuration. Validates with `ferroxy --config examples/ferroxy.toml --check`.
#
# This file exercises the full schema; cert/key paths are placeholders and
# `--check` will fail until they exist on disk. Replace with real paths or
# remove the [tls] block + listen_https/listen_h3 to validate.

[server]
runtime = "monoio"
workers = "auto"
cpu_affinity = true
listen_http  = ["0.0.0.0:80"]
listen_https = ["0.0.0.0:443"]
listen_h3    = ["0.0.0.0:443"]
admin_listen   = "127.0.0.1:9090"
metrics_listen = "127.0.0.1:9091"

[tls]
min_version = "1.2"
alpn = ["h3", "h2", "http/1.1"]
session_tickets = true
ocsp_stapling = true
certs = [
    { sni = "example.com",   cert = "/etc/ferroxy/example.crt",   key = "/etc/ferroxy/example.key" },
    { sni = "*.example.com", cert = "/etc/ferroxy/wildcard.crt",  key = "/etc/ferroxy/wildcard.key" },
]

[[upstream]]
name = "api"
addrs = ["10.0.0.1:8080", "10.0.0.2:8080"]
protocol = "h2"
lb = "p2c"
connect_timeout = "2s"
pool = { max_idle_per_host = 64, idle_timeout = "60s", max_lifetime = "10m" }
health_check = { path = "/healthz", interval = "5s", unhealthy_threshold = 3, timeout = "1s" }

[[upstream]]
name = "static"
addrs = ["10.0.0.10:8080"]
protocol = "http1"
lb = "round_robin"

[[route]]
match = { host = "api.example.com", path_prefix = "/" }
upstream = "api"
timeouts = { connect = "2s", read = "30s", write = "30s", total = "60s" }
retry = { attempts = 2, on_status = [502, 503, 504], on_connect_error = true }

[[route]]
match = { host = "example.com", path_prefix = "/static" }
upstream = "static"
